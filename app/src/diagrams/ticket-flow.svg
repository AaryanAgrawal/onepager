<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" font-family="'DM Sans', sans-serif">
  <defs>
    <marker id="tf-arr" markerWidth="9" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 9 4, 0 8" fill="#33ee69"/>
    </marker>

    <!-- Subtle shadow for rect nodes -->
    <filter id="tf-shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Node 1: Detected -->
  <g filter="url(#tf-shadow)">
    <rect x="10" y="24" width="190" height="62" rx="12" ry="12" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="105" y="49" text-anchor="middle" font-size="15" font-weight="700" fill="#10100d">Detected</text>
  <text x="105" y="68" text-anchor="middle" font-size="12" font-weight="400" fill="#666">by our remote team or your end-user</text>

  <!-- Node 2: Diagnosed -->
  <g filter="url(#tf-shadow)">
    <rect x="265" y="24" width="200" height="62" rx="12" ry="12" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="365" y="49" text-anchor="middle" font-size="15" font-weight="700" fill="#10100d">Diagnosed</text>
  <text x="365" y="68" text-anchor="middle" font-size="12" font-weight="400" fill="#666">by technical remote support team</text>

  <!-- Node 3: Resolved -->
  <g filter="url(#tf-shadow)">
    <rect x="520" y="24" width="190" height="62" rx="12" ry="12" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="615" y="49" text-anchor="middle" font-size="15" font-weight="700" fill="#10100d">Resolved</text>
  <text x="615" y="68" text-anchor="middle" font-size="12" font-weight="400" fill="#666">and documented</text>

  <!-- Node 4: Dispatched (below, between Diagnosed and Resolved) -->
  <g filter="url(#tf-shadow)">
    <rect x="350" y="154" width="200" height="62" rx="12" ry="12" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="450" y="179" text-anchor="middle" font-size="15" font-weight="700" fill="#10100d">Dispatched</text>
  <text x="450" y="198" text-anchor="middle" font-size="12" font-weight="400" fill="#666">field technician rapidly</text>

  <!-- Arrow 1: Detected → Diagnosed (straight horizontal) -->
  <path d="M 200 55 L 265 55" fill="none" stroke="#33ee69" stroke-width="2.5" marker-end="url(#tf-arr)"/>

  <!-- Arrow 2: Diagnosed → Resolved (straight horizontal) -->
  <path d="M 465 55 L 520 55" fill="none" stroke="#33ee69" stroke-width="2.5" marker-end="url(#tf-arr)"/>

  <!-- Arrow 3: Diagnosed → Dispatched (straight vertical down) -->
  <path d="M 365 86 L 365 154" fill="none" stroke="#33ee69" stroke-width="2.5" marker-end="url(#tf-arr)"/>

  <!-- Arrow 4: Dispatched → Resolved (L-shape with smooth 90° corner) -->
  <path d="M 550 185 L 607 185 Q 615 185 615 177 L 615 86" fill="none" stroke="#33ee69" stroke-width="2.5" marker-end="url(#tf-arr)"/>
</svg>
