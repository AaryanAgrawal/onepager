<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 155" font-family="'DM Sans', sans-serif">
  <defs>
    <marker id="tf-arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 6 2.5, 0 5" fill="#bbb"/>
    </marker>
    <filter id="tf-shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.05"/>
    </filter>
  </defs>
  <!-- Connectors — grey arrows -->
  <path d="M 152 36 L 200 36" fill="none" stroke="#bbb" stroke-width="1.8" marker-end="url(#tf-arr)"/>
  <path d="M 370 36 L 420 36" fill="none" stroke="#bbb" stroke-width="1.8" marker-end="url(#tf-arr)"/>
  <!-- Diagnosed → Dispatched: 90° bend down then right -->
  <path d="M 330 56 L 330 82 Q 330 90 338 90 L 360 90" fill="none" stroke="#bbb" stroke-width="1.8" marker-end="url(#tf-arr)"/>
  <!-- Dispatched → Resolved: L-shape right then up -->
  <path d="M 510 90 L 540 90 Q 548 90 548 82 L 548 56" fill="none" stroke="#bbb" stroke-width="1.8" marker-end="url(#tf-arr)"/>

  <!-- Node 1: Detected (orange) -->
  <g filter="url(#tf-shadow)">
    <rect x="6" y="12" width="146" height="48" rx="10" fill="#FFF4ED" stroke="#FF6821" stroke-width="1.5"/>
  </g>
  <text x="79" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#10100d">Detected</text>
  <text x="79" y="47" text-anchor="middle" font-size="9" font-weight="400" fill="#666">by remote team or end-user</text>

  <!-- Node 2: Diagnosed (yellow) -->
  <g filter="url(#tf-shadow)">
    <rect x="210" y="12" width="160" height="48" rx="10" fill="#FFFBEB" stroke="#EAB308" stroke-width="1.5"/>
  </g>
  <text x="290" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#10100d">Diagnosed</text>
  <text x="290" y="47" text-anchor="middle" font-size="9" font-weight="400" fill="#666">by technical remote support</text>

  <!-- Node 3: Resolved (green) -->
  <g filter="url(#tf-shadow)">
    <rect x="430" y="12" width="150" height="48" rx="10" fill="#ECFDF5" stroke="#009F4A" stroke-width="1.5"/>
  </g>
  <text x="505" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="#10100d">Resolved</text>
  <text x="505" y="47" text-anchor="middle" font-size="9" font-weight="400" fill="#666">and documented</text>

  <!-- Node 4: Dispatched (yellow-green) -->
  <g filter="url(#tf-shadow)">
    <rect x="370" y="70" width="140" height="42" rx="10" fill="#F0FFF4" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="440" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#10100d">Dispatched</text>
  <text x="440" y="102" text-anchor="middle" font-size="9" font-weight="400" fill="#666">field technician rapidly</text>
</svg>
