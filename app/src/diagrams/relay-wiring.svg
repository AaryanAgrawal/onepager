<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 185" font-family="'DM Sans', sans-serif">
  <defs>
    <marker id="rw-arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 7 3, 0 6" fill="#33ee69"/>
    </marker>
    <marker id="rw-arr-orange" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 7 3, 0 6" fill="#FF6821"/>
    </marker>
    <filter id="rw-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#33ee69" flood-opacity="0.7"/>
    </filter>
    <filter id="rw-glow-light" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#EAB308" flood-opacity="0.35"/>
    </filter>
    <filter id="rw-shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Connectors -->
  <line x1="120" y1="52" x2="210" y2="52" stroke="#33ee69" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="275" y1="52" x2="350" y2="52" stroke="#33ee69" stroke-width="2.5"/>
  <text x="315" y="43" font-size="9" fill="#999" text-anchor="middle">diagnose</text>
  <line x1="580" y1="52" x2="478" y2="52" stroke="#FF6821" stroke-width="2.5" marker-end="url(#rw-arr-orange)"/>
  <path d="M 245,82 L 245,112 Q 245,120 237,120 L 220,120" stroke="#33ee69" stroke-width="2.5" fill="none"/>
  <text x="218" y="100" font-size="9" fill="#999" text-anchor="end">dispatch</text>
  <path d="M 245,82 L 245,150 Q 245,158 253,158 L 300,158" stroke="#33ee69" stroke-width="2.5" fill="none"/>
  <text x="262" y="138" font-size="9" fill="#999" text-anchor="end">escalate</text>

  <!-- Your Robot (yellow) -->
  <g filter="url(#rw-glow-light)">
    <rect x="10" y="34" width="110" height="36" rx="10" fill="#FFFBEB" stroke="#EAB308" stroke-width="1.5"/>
  </g>
  <text x="65" y="57" font-size="12" font-weight="700" fill="#10100d" text-anchor="middle">Your Robot</text>

  <!-- Relay hub -->
  <g filter="url(#rw-glow)">
    <circle cx="245" cy="52" r="30" fill="#33ee69"/>
  </g>
  <g transform="translate(237, 34)">
    <svg width="16" height="16" viewBox="0 0 256 256" fill="#10100d">
      <path d="M208,144a15.78,15.78,0,0,1-10.42,14.94l-51.65,19-19,51.61a15.92,15.92,0,0,1-29.88,0L78.07,178l-51.65-19a15.92,15.92,0,0,1,0-29.88l51.65-19,19-51.65a15.92,15.92,0,0,1,29.88,0l19,51.65,51.61,19A15.78,15.78,0,0,1,208,144ZM152,48h16V64a8,8,0,0,0,16,0V48h16a8,8,0,0,0,0-16H184V16a8,8,0,0,0-16,0V32H152a8,8,0,0,0,0,16Zm88,32h-8V72a8,8,0,0,0-16,0v8h-8a8,8,0,0,0,0,16h8v8a8,8,0,0,0,16,0V96h8a8,8,0,0,0,0-16Z"/>
    </svg>
  </g>
  <text x="245" y="66" font-size="12" font-weight="700" fill="#10100d" text-anchor="middle">Relay</text>

  <!-- Remote Support -->
  <g filter="url(#rw-shadow)">
    <rect x="350" y="34" width="128" height="36" rx="10" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="414" y="57" font-size="12" font-weight="700" fill="#10100d" text-anchor="middle">Remote Support</text>

  <!-- Customer (orange) -->
  <g filter="url(#rw-shadow)">
    <rect x="530" y="34" width="100" height="36" rx="10" fill="#FFF4ED" stroke="#FF6821" stroke-width="1.5"/>
  </g>
  <text x="580" y="57" font-size="12" font-weight="700" fill="#FF6821" text-anchor="middle">Customer</text>

  <!-- Field Tech -->
  <g filter="url(#rw-shadow)">
    <rect x="110" y="104" width="110" height="36" rx="10" fill="#f5f5f5" stroke="#33ee69" stroke-width="1.5"/>
  </g>
  <text x="165" y="127" font-size="12" font-weight="700" fill="#10100d" text-anchor="middle">Field Tech</text>

  <!-- Your Engineers (yellow) -->
  <g filter="url(#rw-shadow)">
    <rect x="300" y="140" width="130" height="36" rx="10" fill="#FFFBEB" stroke="#EAB308" stroke-width="1.5"/>
  </g>
  <text x="365" y="163" font-size="12" font-weight="700" fill="#10100d" text-anchor="middle">Your Engineers</text>
</svg>
